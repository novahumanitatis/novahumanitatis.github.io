<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About Nova Humanitatis</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #000;
    }

    body {
      color: #fff;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    .nav {
      position: fixed;
      top: 22px;
      right: 28px;
      z-index: 20;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .nav a {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 104px;
      padding: 13px 20px;
      color: #f7fbff;
      text-decoration: none;
      font-family: "Cinzel", Georgia, serif;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      overflow: hidden;
      animation: floatPane 5.5s ease-in-out infinite;
      transition:
        transform 220ms ease,
        border-color 220ms ease,
        background 220ms ease,
        box-shadow 220ms ease;
    }

    .nav a:nth-child(2) {
      animation-delay: 500ms;
    }

    .nav a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 0%,
        rgba(255, 255, 255, 0.38) 45%,
        transparent 72%
      );
      transform: translateX(-120%);
      transition: transform 520ms ease;
    }

    .nav a:hover,
    .nav a:focus-visible {
      transform: translateY(-4px) scale(1.035);
      border-color: rgba(255, 255, 255, 0.56);
      background: rgba(255, 255, 255, 0.18);
      box-shadow:
        0 16px 42px rgba(47, 159, 255, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.42);
      outline: none;
    }

    .nav a:hover::before,
    .nav a:focus-visible::before {
      transform: translateX(120%);
    }

    .page-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    @keyframes floatPane {
      0%, 100% {
        translate: 0 0;
      }

      50% {
        translate: 0 -6px;
      }
    }

    @media (max-width: 720px) {
      .nav {
        top: 16px;
        right: 16px;
        left: 16px;
        justify-content: flex-end;
        gap: 9px;
      }

      .nav a {
        min-width: 0;
        padding: 11px 12px;
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>
  <nav class="nav" aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="episodes.html">Episodes</a>
  </nav>

  <img class="page-image" src="about-page.png" alt="About Nova Humanitatis">
</body>
</html>
