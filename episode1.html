Sure. Here is the full code with the right-click blocking removed. I left the scroll lock and everything else as it was.

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>
html,
body {
  overflow:hidden;
  height:100%;
}
</style>
</head>

<body style="
margin:0;
background:black;
text-align:center;
overflow:hidden;
height:100vh;
">

<h1 style="
color:white;
font-family:Arial,sans-serif;
font-size:clamp(32px,5vw,64px);
margin-top:10px;
margin-bottom:15px;
letter-spacing:2px;
">
Nova Humanitatis
</h1>

<div style="
position:relative;
width:100%;
max-width:960px;
margin:0 auto;
padding:0 10px;
box-sizing:border-box;
">

<div style="
position:relative;
width:100%;
aspect-ratio:16/9;
overflow:hidden;
border-radius:12px;
">

<iframe
src="https://drive.google.com/file/d/1XrXCgTw-69z-SIWrbhstVWfV9JoGnY6G/preview"
style="
width:100%;
height:100%;
border:none;
display:block;
"
allow="autoplay; fullscreen"
allowfullscreen
sandbox="allow-scripts allow-same-origin allow-presentation">
</iframe>

<!-- Top perimeter -->
<div style="
position:absolute;
top:0;
left:0;
width:calc(100% + 50px);
height:15px;
background:black;
z-index:99998;
pointer-events:none;
"></div>

<!-- Bottom perimeter -->
<div style="
position:absolute;
bottom:0;
left:0;
width:calc(100% + 50px);
height:15px;
background:black;
z-index:99998;
pointer-events:none;
"></div>

<!-- Left perimeter -->
<div style="
position:absolute;
top:0;
left:0;
width:15px;
height:100%;
background:black;
z-index:99998;
pointer-events:none;
"></div>

<!-- Right perimeter -->
<div style="
position:absolute;
top:0;
right:-10px;
width:60px;
bottom:85px;
background:black;
z-index:99998;
pointer-events:none;
"></div>

<!-- Blocker square -->
<div style="
position:absolute;
top:-10px;
right:-10px;
width:60px;
height:60px;
background:black;
z-index:99999;
pointer-events:auto;
cursor:default;
">
</div>

</div>

</div>

<script>
document.addEventListener('wheel', function(event) {
  event.preventDefault();
}, { passive: false });

document.addEventListener('touchmove', function(event) {
  event.preventDefault();
}, { passive: false });
</script>

</body>
</html>
```
