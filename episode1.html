Yes. Start clean: no blockers, no right-click script, no control cover, no perimeter overlays. Same iframe `src`, `allow`, `allowfullscreen`, and `sandbox`.

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>
html,
body {
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}

body {
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

h1 {
  color:white;
  font-family:Arial,sans-serif;
  font-size:clamp(32px,5vw,64px);
  margin:10px 0 15px;
  letter-spacing:2px;
  flex:0 0 auto;
}

.video-wrap {
  position:relative;
  width:calc(100% - 20px);
  max-width:960px;
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:12px;
  background:black;
}

.video-wrap iframe {
  width:100%;
  height:100%;
  border:none;
  display:block;
}
</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="video-wrap">
  <iframe
    src="https://drive.google.com/file/d/1XrXCgTw-69z-SIWrbhstVWfV9JoGnY6G/preview"
    allow="autoplay; fullscreen"
    allowfullscreen
    sandbox="allow-scripts allow-same-origin allow-presentation">
  </iframe>
</div>

</body>
</html>
```

This removes the pieces most likely causing the mobile fading/blocked control behavior.
