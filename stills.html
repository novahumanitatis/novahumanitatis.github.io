<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova Humanitatis — Stills</title>

<style>
html,
body{
    margin:0;
    min-height:100%;
    background:#000000;
    color:white;
    font-family:Arial, sans-serif;
}

body{
    text-align:center;
}

header{
    padding:24px 20px 10px;
}

h1{
    margin:0;
    color:#d4af37;
    font-size:clamp(34px, 5vw, 64px);
    letter-spacing:2px;
}

nav{
    margin-top:18px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 14px;
    font-size:16px;
    opacity:0.85;
}

nav a:hover{
    color:#d4af37;
}

.gallery{
    max-width:1200px;
    margin:30px auto 60px;
    padding:0 22px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
    gap:18px;
}

.gallery img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    background:#111;
    transition:transform 0.25s ease, opacity 0.25s ease;
}

.gallery img:hover{
    transform:scale(1.03);
    opacity:0.9;
}

.viewer{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.94);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.viewer img{
    max-width:90vw;
    max-height:84vh;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:32px;
    font-size:44px;
    color:white;
    cursor:pointer;
    z-index:10001;
}

.close:hover{
    color:#d4af37;
}

.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:56px;
    color:white;
    background:rgba(0,0,0,0.35);
    border:none;
    cursor:pointer;
    padding:10px 18px;
    border-radius:8px;
    z-index:10001;
    user-select:none;
}

.arrow:hover{
    color:#d4af37;
    background:rgba(255,255,255,0.08);
}

.arrow-left{
    left:22px;
}

.arrow-right{
    right:22px;
}

@media (max-width:700px){
    .arrow{
        font-size:40px;
        padding:8px 14px;
    }

    .close{
        font-size:36px;
        right:20px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Nova Humanitatis — Stills</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="episodes.html">Episodes</a>
        <a href="stills.html">Stills</a>
        <a href="about.html">About</a>
    </nav>
</header>

<main class="gallery">
    <img src="stills-img/episode1-001.jpg" onclick="openViewer(0)" alt="Nova Humanitatis still 1">
    <img src="stills-img/episode1-002.jpg" onclick="openViewer(1)" alt="Nova Humanitatis still 2">
    <img src="stills-img/episode1-003.jpg" onclick="openViewer(2)" alt="Nova Humanitatis still 3">
    <img src="stills-img/episode1-004.jpg" onclick="openViewer(3)" alt="Nova Humanitatis still 4">
</main>

<div class="viewer" id="viewer">
    <span class="close" onclick="closeViewer()">&times;</span>

    <button class="arrow arrow-left" onclick="prevImage()">&#10094;</button>
    <img id="viewerImage" alt="Expanded Nova Humanitatis still">
    <button class="arrow arrow-right" onclick="nextImage()">&#10095;</button>
</div>

<script>
const images = [
    "stills-img/episode1-001.jpg",
    "stills-img/episode1-002.jpg",
    "stills-img/episode1-003.jpg",
    "stills-img/episode1-004.jpg"
];

let currentIndex = 0;

function openViewer(index){
    currentIndex = index;
    document.getElementById("viewerImage").src = images[currentIndex];
    document.getElementById("viewer").style.display = "flex";
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
}

function nextImage(){
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("viewerImage").src = images[currentIndex];
}

function prevImage(){
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("viewerImage").src = images[currentIndex];
}

document.addEventListener("keydown", function(event){
    const viewer = document.getElementById("viewer");
    if(viewer.style.display === "flex"){
        if(event.key === "ArrowRight"){
            nextImage();
        }
        if(event.key === "ArrowLeft"){
            prevImage();
        }
        if(event.key === "Escape"){
            closeViewer();
        }
    }
});

document.getElementById("viewer").addEventListener("click", function(event){
    if(event.target.id === "viewer"){
        closeViewer();
    }
});
</script>

</body>
</html>
