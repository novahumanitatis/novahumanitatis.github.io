<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:25px;
    letter-spacing:2px;
    text-shadow:0 0 12px rgba(180,220,255,.4);
}

/* MAIN CONTAINER */

.cinema-frame{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
}

/* VIDEO */

.video-container{
    position:relative;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* FILM STRIPS */

.film-left,
.film-right{
    position:absolute;
    top:0;
    bottom:0;
    width:72px;

    background:
    linear-gradient(
        to right,
        rgba(10,15,30,.98),
        rgba(20,25,45,.98)
    );

    box-shadow:
        0 0 20px rgba(120,180,255,.25),
        inset 0 0 25px rgba(255,255,255,.05);

    z-index:40;
    pointer-events:none;
}

.film-left{
    left:0;
}

.film-right{
    right:0;
}

/* SPROCKET HOLES */

.hole{
    width:42px;
    height:52px;

    background:#000;

    border:
    1px solid rgba(255,255,255,.15);

    margin:8px auto;

    box-shadow:
        inset 0 0 10px rgba(0,0,0,.9);
}

/* HUD CORNERS */

.corner{
    position:absolute;
    width:70px;
    height:70px;
    z-index:50;
    pointer-events:none;
}

.tl{
    top:-8px;
    left:-8px;
    border-top:3px solid #b8e0ff;
    border-left:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

.tr{
    top:-8px;
    right:-8px;
    border-top:3px solid #b8e0ff;
    border-right:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

.bl{
    bottom:-8px;
    left:-8px;
    border-bottom:3px solid #b8e0ff;
    border-left:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

.br{
    bottom:-8px;
    right:-8px;
    border-bottom:3px solid #b8e0ff;
    border-right:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

/* CONTAINMENT FIELD */

.googleius-blocker{
    position:absolute;
    top:0;
    right:0;
    width:90px;
    height:90px;
    z-index:60;
    background:transparent;
    pointer-events:auto;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="cinema-frame">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="film-left">

        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>

    </div>

    <div class="film-right">

        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>

    </div>

    <div class="video-container">

        <iframe
        src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
        allow="autoplay"
        allowfullscreen
        sandbox="allow-scripts allow-same-origin">
        </iframe>

        <div class="googleius-blocker"></div>

    </div>

</div>

</body>
</html>
