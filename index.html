<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Humanitatis</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: "Cinzel", "Georgia", serif;
      color: #ffffff;
      background: #02040a;
    }

    body {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(
          rgba(0, 0, 0, 0.18),
          rgba(0, 0, 0, 0.48)
        ),
        url("home.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100svh;
      overflow: hidden;
      padding: 28px;
    }

    .nav {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 10;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .nav a {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 118px;
      padding: 13px 22px;
      color: #f7fbff;
      text-decoration: none;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      overflow: hidden;
      transition:
        transform 220ms ease,
        border-color 220ms ease,
        background 220ms ease,
        box-shadow 220ms ease;
      animation: floatPane 5.5s ease-in-out infinite;
    }

    .nav a:nth-child(2) {
      animation-delay: 700ms;
    }

    .nav a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 0%,
        rgba(255, 255, 255, 0.38) 45%,
        transparent 72%
      );
      transform: translateX(-120%);
      transition: transform 520ms ease;
    }

    .nav a:hover {
      transform: translateY(-4px) scale(1.035);
      border-color: rgba(255, 255, 255, 0.56);
      background: rgba(255, 255, 255, 0.18);
      box-shadow:
        0 16px 42px rgba(47, 159, 255, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.42);
    }

    .nav a:hover::before {
      transform: translateX(120%);
    }

    .hero {
      position: absolute;
      top: clamp(42px, 6svh, 76px);
      left: clamp(24px, 4vw, 54px);
      max-width: min(820px, calc(100vw - 430px));
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.78);
      animation: riseIn 1100ms ease both;
    }

    .hero h1 {
      font-size: clamp(3.4rem, 5.8vw, 6.2rem);
      line-height: 0.86;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero p {
      margin-top: 24px;
      max-width: 900px;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: clamp(1rem, 1.45vw, 1.24rem);
      font-weight: 700;
      line-height: 1.45;
      color: rgba(246, 250, 255, 0.92);
    }

    @keyframes floatPane {
      0%, 100% {
        translate: 0 0;
      }

      50% {
        translate: 0 -6px;
      }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1180px) {
      .hero {
        top: 42px;
        max-width: calc(100vw - 48px);
      }

      .hero h1 {
        font-size: clamp(3.1rem, 7.8vw, 5.8rem);
      }

      .hero p {
        max-width: 850px;
      }
    }

    @media (max-width: 680px) {
      .page {
        padding: 18px;
      }

      .nav {
        top: 16px;
        right: 16px;
        left: 16px;
        justify-content: flex-end;
        gap: 10px;
      }

      .nav a {
        min-width: 0;
        padding: 11px 14px;
        font-size: 0.76rem;
      }

      .hero {
        top: 92px;
        left: 22px;
        right: 22px;
        max-width: none;
      }

      .hero h1 {
        font-size: clamp(2.8rem, 13vw, 4.4rem);
      }

      .hero p {
        margin-top: 18px;
        max-width: 100%;
        font-size: 0.98rem;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <nav class="nav" aria-label="Main navigation">
      <a href="episodes.html">Episodes</a>
      <a href="about.html">About</a>
    </nav>

    <section class="hero">
      <h1>Nova Humanitatis</h1>
      <p>
        A cinematic journey through humanity, memory, civilization, and the stars
      </p>
    </section>
  </main>
</body>
</html>
