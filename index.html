<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Humanitatis</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: "Cinzel", "Georgia", serif;
      color: #ffffff;
      background: #02040a;
    }

    body {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(
          rgba(0, 0, 0, 0.04),
          rgba(0, 0, 0, 0.16)
        ),
        url("home.webp");
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100svh;
      overflow: hidden;
      padding: 28px;
    }

    .nav {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 10;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .nav a {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 118px;
      padding: 13px 22px;
      color: #d8a327;
      text-decoration: none;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 8px;
      background: rgba(28, 30, 34, 0.86);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.26),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      overflow: hidden;
      transition:
        transform 220ms ease,
        border-color 220ms ease,
        background 220ms ease,
        box-shadow 220ms ease;
    }

    .nav a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 0%,
        rgba(255, 255, 255, 0.38) 45%,
        transparent 72%
      );
      transform: translateX(-120%);
      transition: transform 520ms ease;
    }

    .nav a:hover,
    .nav a:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(36, 39, 45, 0.9);
      box-shadow:
        0 16px 42px rgba(47, 159, 255, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      outline: none;
    }

    .nav a:hover::before,
    .nav a:focus-visible::before {
      transform: translateX(120%);
    }

    @media (max-width: 680px) {
      .page {
        padding: 18px;
      }

      .nav {
        top: 16px;
        right: 16px;
        left: 16px;
        justify-content: flex-end;
        gap: 10px;
      }

      .nav a {
        min-width: 0;
        padding: 11px 14px;
        font-size: 0.76rem;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <nav class="nav" aria-label="Main navigation">
      <a href="stills.html">Stills</a>
      <a href="episodes.html">Episodes</a>
      <a href="about.html">About</a>
    </nav>
  </main>
</body>
</html>
