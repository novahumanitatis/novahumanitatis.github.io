<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:30px;
}

.video-frame{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
}

.video-container{
    position:relative;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* HUD CORNERS */

.corner{
    position:absolute;
    width:60px;
    height:60px;
    pointer-events:none;
    z-index:30;
}

.tl-corner{
    top:-8px;
    left:-8px;
    border-top:3px solid #b8e0ff;
    border-left:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

.tr-corner{
    top:-8px;
    right:-8px;
    border-top:3px solid #b8e0ff;
    border-right:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

.bl-corner{
    bottom:-8px;
    left:-8px;
    border-bottom:3px solid #b8e0ff;
    border-left:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

.br-corner{
    bottom:-8px;
    right:-8px;
    border-bottom:3px solid #b8e0ff;
    border-right:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

/* GOOGLEIUS CLONES */

.clone{
    position:absolute;
    width:32px;
    height:32px;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.25);
    z-index:40;
    pointer-events:none;
}

.clone svg{
    position:absolute;
    left:5px;
    top:5px;
    width:22px;
    height:22px;
    opacity:.85;
}

.tl{
    top:14px;
    left:14px;
}

.bl{
    bottom:14px;
    left:14px;
}

.br{
    bottom:14px;
    right:14px;
}

/* CONTAINMENT FIELD */

.googleius-blocker{
    position:absolute;
    top:0;
    right:0;
    width:70px;
    height:70px;
    background:transparent;
    z-index:50;
    pointer-events:auto;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="video-frame">

    <div class="corner tl-corner"></div>
    <div class="corner tr-corner"></div>
    <div class="corner bl-corner"></div>
    <div class="corner br-corner"></div>

    <!-- Anti-Google Mr Squares -->

    <div class="clone tl">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M14 3h7v7"/>
            <path d="M21 3L10 14"/>
            <path d="M21 14v7H3V3h7"/>
        </svg>
    </div>

    <div class="clone bl">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M14 3h7v7"/>
            <path d="M21 3L10 14"/>
            <path d="M21 14v7H3V3h7"/>
        </svg>
    </div>

    <div class="clone br">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M14 3h7v7"/>
            <path d="M21 3L10 14"/>
            <path d="M21 14v7H3V3h7"/>
        </svg>
    </div>

    <div class="video-container">

        <iframe
            src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
            allow="autoplay"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin">
        </iframe>

        <div class="googleius-blocker"></div>

    </div>

</div>

</body>
</html>
