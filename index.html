<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>
body {
    margin: 0;
    padding: 40px;
    background: #07122a;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    font-size: 64px;
    margin-bottom: 20px;
}

.video-container {
    max-width: 1000px;
    margin: 30px auto;
}

#player {
    width: 100%;
    aspect-ratio: 16 / 9;
}
</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="video-container">
    <div id="player"></div>
</div>

<script src="https://api.dmcdn.net/all.js"></script>

<script>
const player = DM.player(document.getElementById('player'), {
    video: 'k1hfyk3ZCCYJDnGUCdw',
    width: '100%',
    params: {
        autoplay: false
    }
});

let stopped = false;

player.addEventListener('timeupdate', function(event) {
    if (!stopped && event.time >= 163) { // 2:43
        stopped = true;
        player.pause();
        player.seek(163);
    }
});
</script>

</body>
</html>
