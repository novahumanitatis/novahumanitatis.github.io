<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:30px;
}

.video-frame{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
}

.video-container{
    position:relative;
    aspect-ratio:16/9;
}

/* Google iframe */

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* Bluish metallic HUD corners */

.corner{
    position:absolute;
    width:60px;
    height:60px;
    pointer-events:none;
    z-index:30;
}

.tl-corner{
    top:-8px;
    left:-8px;
    border-top:3px solid #b8e0ff;
    border-left:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.7);
}

.tr-corner{
    top:-8px;
    right:-8px;
    border-top:3px solid #b8e0ff;
    border-right:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.7);
}

.bl-corner{
    bottom:-8px;
    left:-8px;
    border-bottom:3px solid #b8e0ff;
    border-left:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.7);
}

.br-corner{
    bottom:-8px;
    right:-8px;
    border-bottom:3px solid #b8e0ff;
    border-right:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.7);
}

/* Anti-Google Mr Squares */

.fake-square{
    position:absolute;
    width:42px;
    height:42px;
    background:rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.4);
    z-index:40;
    pointer-events:none;
}

/* Positions */

.tl{
    top:18px;
    left:18px;
}

.bl{
    bottom:18px;
    left:18px;
}

.br{
    bottom:18px;
    right:18px;
}

/* Open-in-new style icon */

.fake-square::before{
    content:"";
    position:absolute;
    width:12px;
    height:12px;
    border-top:2px solid rgba(255,255,255,.9);
    border-right:2px solid rgba(255,255,255,.9);
    top:8px;
    right:8px;
}

.fake-square::after{
    content:"";
    position:absolute;
    width:14px;
    height:14px;
    border-left:2px solid rgba(255,255,255,.9);
    border-bottom:2px solid rgba(255,255,255,.9);
    left:10px;
    bottom:8px;
}

/* Hover blocker over real Googleius */

.googleius-blocker{
    position:absolute;
    top:0;
    right:0;
    width:70px;
    height:70px;
    background:transparent;
    z-index:50;
    pointer-events:auto;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="video-frame">

    <!-- HUD Corners -->

    <div class="corner tl-corner"></div>
    <div class="corner tr-corner"></div>
    <div class="corner bl-corner"></div>
    <div class="corner br-corner"></div>

    <!-- Anti-Google Mr Squares -->

    <div class="fake-square tl"></div>
    <div class="fake-square bl"></div>
    <div class="fake-square br"></div>

    <div class="video-container">

        <iframe
            src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
            allow="autoplay"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin">
        </iframe>

        <!-- Commander Googleius containment field -->

        <div class="googleius-blocker"></div>

    </div>

</div>

</body>
</html>
