<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:25px;
    letter-spacing:2px;
}

.cinema-frame{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
}

.video-container{
    position:relative;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* LEFT FILM STRIP */

.film-left{
    position:absolute;
    top:0;
    bottom:0;

    width:48px;

    background:linear-gradient(
        to right,
        #1a1a1a 0%,
        #2b2b2b 25%,
        #3d3d3d 50%,
        #5a5a5a 75%,
        #7a7a7a 100%
    );

    left:-8px;

    z-index:40;
    pointer-events:none;

    clip-path:polygon(
        0 0,
        100% 0,
        100% 82%,
        70% 88%,
        55% 92%,
        35% 96%,
        20% 100%,
        0 100%
    );
}

/* RIGHT FILM STRIP */

.film-right{
    position:absolute;
    top:0;
    bottom:0;

    width:70px;

    background:linear-gradient(
        to left,
        #1a1a1a 0%,
        #2b2b2b 25%,
        #3d3d3d 50%,
        #5a5a5a 75%,
        #7a7a7a 100%
    );

    right:-8px;

    z-index:40;
    pointer-events:none;

    clip-path:polygon(
        0 0,
        100% 0,
        100% 100%,
        80% 100%,
        65% 96%,
        45% 92%,
        30% 88%,
        0 82%
    );
}

/* FILM SPROCKET HOLES */

.hole{
    width:20px;
    height:46px;

    background:#e6e6e6;

    border-radius:3px;

    margin:8px auto;

    box-shadow:
        inset 0 0 3px rgba(0,0,0,.35),
        0 0 2px rgba(255,255,255,.10);
}

/* COMMANDER GOOGLEIUS CONTAINMENT */

.googleius-blocker{
    position:absolute;
    top:0;
    right:0;

    width:100px;
    height:100px;

    background:transparent;

    z-index:60;
    pointer-events:auto;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="cinema-frame">

    <!-- LEFT FILM STRIP -->

    <div class="film-left">

        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>

    </div>

    <!-- RIGHT FILM STRIP -->

    <div class="film-right">

        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>

    </div>

    <!-- VIDEO -->

    <div class="video-container">

        <iframe
            src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
            allow="autoplay"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin">
        </iframe>

        <!-- Commander Googleius Containment Shield -->

        <div class="googleius-blocker"></div>

    </div>

</div>

</body>
</html>
