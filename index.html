<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-top:40px;
    margin-bottom:30px;
}

.cover{
    width:90%;
    max-width:960px;
    cursor:pointer;
    border:3px solid white;
    transition:0.3s;
}

.cover:hover{
    transform:scale(1.01);
}

.video-container{
    display:none;
    width:90%;
    max-width:960px;
    margin:0 auto;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:3px solid white;
}

.play-button{
    margin-top:20px;
    margin-bottom:20px;
    font-size:28px;
    padding:15px 40px;
    background:#ffffff;
    color:#07122a;
    border:none;
    cursor:pointer;
    border-radius:8px;
    font-weight:bold;
}

.play-button:hover{
    background:#dddddd;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<img
src="Episode 1.png"
alt="Episode 1"
class="cover"
id="coverImage">

<br>

<button class="play-button" id="playButton">
▶ WATCH EPISODE 1
</button>

<div class="video-container" id="videoContainer">

<iframe
src="https://drive.google.com/file/d/1xphi8NVdWi1YEi88C-hHaWsJqQHQXAWW/preview"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

<script>

function startVideo(){

    document.getElementById("coverImage").style.display="none";

    document.getElementById("playButton").style.display="none";

    document.getElementById("videoContainer").style.display="block";

}

document.getElementById("coverImage").onclick=startVideo;
document.getElementById("playButton").onclick=startVideo;

</script>

</body>
</html>
