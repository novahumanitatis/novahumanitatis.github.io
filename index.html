<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:30px;
    letter-spacing:2px;
}

.video-frame{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
}

.video-container{
    position:relative;
    aspect-ratio:16/9;
    overflow:hidden;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* Futuristic Corner Brackets */

.corner{
    position:absolute;
    width:60px;
    height:60px;
    pointer-events:none;
    z-index:10;
}

/* Top Left */
.tl{
    top:-8px;
    left:-8px;
    border-top:3px solid rgba(180,220,255,.8);
    border-left:3px solid rgba(180,220,255,.8);
}

/* Top Right */
.tr{
    top:-8px;
    right:-8px;
    border-top:3px solid rgba(180,220,255,.8);
    border-right:3px solid rgba(180,220,255,.8);
}

/* Bottom Left */
.bl{
    bottom:-8px;
    left:-8px;
    border-bottom:3px solid rgba(180,220,255,.8);
    border-left:3px solid rgba(180,220,255,.8);
}

/* Bottom Right */
.br{
    bottom:-8px;
    right:-8px;
    border-bottom:3px solid rgba(180,220,255,.8);
    border-right:3px solid rgba(180,220,255,.8);
}

/* Soft glow */

.corner{
    box-shadow:0 0 10px rgba(120,180,255,.4);
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="video-frame">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="video-container">
        <iframe
            src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
            allow="autoplay"
            allowfullscreen>
        </iframe>
    </div>

</div>

</body>
</html>
