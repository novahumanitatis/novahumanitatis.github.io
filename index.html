<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:30px;
}

.video-container{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
}

/* Cover Google's annoying popout icon */

.icon-blocker{
    position:absolute;
    top:0;
    right:0;
    width:60px;
    height:60px;
    background:#07122a;
    z-index:9999;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="video-container">

    <iframe
        src="https://drive.google.com/file/d/1xphi8NVdWi1YEi88C-hHaWsJqQHQXAWW/preview"
        allow="autoplay"
        allowfullscreen
        sandbox="allow-scripts allow-same-origin">
    </iframe>

    <div class="icon-blocker"></div>

</div>

</body>
</html>
