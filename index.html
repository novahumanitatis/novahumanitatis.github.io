<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:40px;
    letter-spacing:2px;
}

/* PREMIUM MONITOR */

.monitor-frame{

    position:relative;

    display:inline-block;

    padding-top:28px;
    padding-right:28px;
    padding-bottom:18px;
    padding-left:18px;

    background:linear-gradient(
        135deg,
        #050505 0%,
        #151515 25%,
        #242424 50%,
        #151515 75%,
        #050505 100%
    );

    border-radius:24px;

    box-shadow:
        0 0 30px rgba(0,0,0,.6),
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 -1px 0 rgba(0,0,0,.6);

}

/* VIDEO */

.video-container{

    position:relative;

    width:1200px;
    max-width:90vw;

}

.video-container iframe{

    display:block;

    width:100%;
    aspect-ratio:16/9;

    border:none;

    border-radius:8px;

}

/* GOOGLEIUS CONTAINMENT */

.googleius-blocker{

    position:absolute;

    top:0;
    right:0;

    width:140px;
    height:120px;

    background:transparent;

    z-index:999;

    pointer-events:auto;

}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="monitor-frame">

    <div class="video-container">

        <iframe
            src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
            allow="autoplay"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin">
        </iframe>

        <div class="googleius-blocker"></div>

    </div>

</div>

</body>
</html>
