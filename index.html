<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:50px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:50px;
    letter-spacing:2px;
}

.cinema-frame{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
}

.video-container{
    position:relative;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* TOP BEZEL */

.top-frame{
    position:absolute;

    top:-34px;
    left:-40px;
    right:-40px;

    height:34px;

    background:linear-gradient(
        to bottom,
        #000000,
        #1d1d1d,
        #000000
    );

    border-top-left-radius:18px;
    border-top-right-radius:18px;

    box-shadow:
        inset 0 -1px 0 rgba(255,255,255,.05),
        0 0 10px rgba(0,0,0,.35);

    z-index:45;
}

/* BOTTOM BEZEL */

.bottom-frame{
    position:absolute;

    left:-40px;
    right:-40px;

    bottom:-34px;

    height:34px;

    background:linear-gradient(
        to top,
        #000000,
        #1d1d1d,
        #000000
    );

    border-bottom-left-radius:18px;
    border-bottom-right-radius:18px;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 10px rgba(0,0,0,.35);

    z-index:45;
}

/* LEFT BEZEL */

.film-left{
    position:absolute;

    top:0;
    bottom:0;

    left:-40px;

    width:52px;

    background:linear-gradient(
        to right,
        #000000,
        #1d1d1d,
        #000000
    );

    z-index:40;
    pointer-events:none;
}

/* RIGHT BEZEL */

.film-right{
    position:absolute;

    top:0;
    bottom:0;

    right:-40px;

    width:52px;

    background:linear-gradient(
        to left,
        #000000,
        #1d1d1d,
        #000000
    );

    z-index:40;
    pointer-events:none;
}

/* SYMMETRICAL CORNER MASKS */

.corner-mask{
    position:absolute;

    width:90px;
    height:90px;

    z-index:55;

    pointer-events:none;

    background:radial-gradient(
        circle,
        rgba(0,0,0,.95) 0%,
        rgba(0,0,0,.98) 60%,
        rgba(0,0,0,1) 100%
    );
}

.tl{
    top:0;
    left:0;
}

.tr{
    top:0;
    right:0;
}

.bl{
    bottom:0;
    left:0;
}

.br{
    bottom:0;
    right:0;
}

/* COMMANDER GOOGLEIUS CONTAINMENT */

.googleius-blocker{
    position:absolute;

    top:0;
    right:0;

    width:140px;
    height:120px;

    background:transparent;

    z-index:999;

    pointer-events:auto;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="cinema-frame">

    <div class="video-container">

        <div class="top-frame"></div>

        <div class="film-left"></div>
        <div class="film-right"></div>

        <iframe
            src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
            allow="autoplay"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin">
        </iframe>

        <!-- Symmetry Department -->

        <div class="corner-mask tl"></div>
        <div class="corner-mask tr"></div>
        <div class="corner-mask bl"></div>
        <div class="corner-mask br"></div>

        <!-- Commander Googleius Containment Shield -->

        <div class="googleius-blocker"></div>

        <div class="bottom-frame"></div>

    </div>

</div>

</body>
</html>
