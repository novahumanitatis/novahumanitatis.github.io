<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:30px;
    letter-spacing:1px;
}

.video-frame{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
}

.video-container{
    position:relative;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* Decorative Commander Googleius clones */

.fake-square{
    position:absolute;
    width:36px;
    height:36px;
    background:rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.45);
    z-index:20;
    pointer-events:none;
    box-sizing:border-box;
}

/* Top Left */
.tl{
    top:12px;
    left:12px;
}

/* Bottom Left */
.bl{
    bottom:12px;
    left:12px;
}

/* Bottom Right */
.br{
    bottom:12px;
    right:12px;
}

/* Draw mini "open" icon */

.fake-square::before{
    content:"";
    position:absolute;
    top:8px;
    left:8px;
    width:12px;
    height:12px;
    border-top:2px solid rgba(255,255,255,.8);
    border-right:2px solid rgba(255,255,255,.8);
}

.fake-square::after{
    content:"";
    position:absolute;
    left:10px;
    bottom:8px;
    width:12px;
    height:12px;
    border-left:2px solid rgba(255,255,255,.8);
    border-bottom:2px solid rgba(255,255,255,.8);
}

/* Optional subtle glow */

.fake-square{
    box-shadow:0 0 8px rgba(255,255,255,.15);
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="video-frame">

    <!-- Decorative clones -->

    <div class="fake-square tl"></div>
    <div class="fake-square bl"></div>
    <div class="fake-square br"></div>

    <div class="video-container">

        <iframe
            src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
            allow="autoplay"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin">
        </iframe>

    </div>

</div>

</body>
</html>
