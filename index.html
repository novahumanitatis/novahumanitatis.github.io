<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:40px;
    letter-spacing:2px;
}

/* OLED FRAME */

.monitor-frame{

    position:relative;

    display:inline-block;

    padding:30px;

    background:linear-gradient(
        135deg,
        #050505 0%,
        #151515 25%,
        #242424 50%,
        #151515 75%,
        #050505 100%
    );

    border-radius:32px;

    box-shadow:
        0 0 40px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 -1px 0 rgba(0,0,0,.7);
}

.monitor-frame::before{

    content:"";

    position:absolute;

    top:12px;
    left:12px;
    right:12px;
    bottom:12px;

    border-radius:24px;

    border:1px solid rgba(255,255,255,.05);

    pointer-events:none;
}

/* VIDEO AREA */

.video-container{

    position:relative;

    width:1200px;
    max-width:90vw;

    background:#000;

    border-radius:16px;

    overflow:hidden;
}

/* SHRINK VIDEO INSIDE FRAME */

.video-inner{

    width:96%;
    margin:2%;
}

.video-inner iframe{

    display:block;

    width:100%;

    aspect-ratio:16/9;

    border:none;

    border-radius:10px;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="monitor-frame">

    <div class="video-container">

        <div class="video-inner">

            <iframe
                src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
                allow="autoplay"
                allowfullscreen
                sandbox="allow-scripts allow-same-origin">
            </iframe>

        </div>

    </div>

</div>

</body>
</html>
