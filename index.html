<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:25px;
}

/* Main Frame */

.video-frame{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
}

/* Video Container */

.video-container{
    position:relative;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* Metallic Blue HUD Corners */

.corner{
    position:absolute;
    width:60px;
    height:60px;
    z-index:40;
    pointer-events:none;
}

.tl-corner{
    top:-8px;
    left:-8px;
    border-top:3px solid #b8e0ff;
    border-left:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

.tr-corner{
    top:-8px;
    right:-8px;
    border-top:3px solid #b8e0ff;
    border-right:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

.bl-corner{
    bottom:-8px;
    left:-8px;
    border-bottom:3px solid #b8e0ff;
    border-left:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

.br-corner{
    bottom:-8px;
    right:-8px;
    border-bottom:3px solid #b8e0ff;
    border-right:3px solid #b8e0ff;
    box-shadow:0 0 12px rgba(120,180,255,.8);
}

/* Signor Macaroni Anti-Google Plates */

.plate{
    position:absolute;
    width:54px;
    height:54px;
    background:#0b1020;
    border:1px solid rgba(255,255,255,.05);
    z-index:35;
    pointer-events:none;
}

/* Plate Positions */

.tl-plate{
    top:6px;
    left:6px;
}

.tr-plate{
    top:6px;
    right:6px;
}

.bl-plate{
    bottom:6px;
    left:6px;
}

.br-plate{
    bottom:6px;
    right:6px;
}

/* Commander Googleius Containment Field */

.googleius-blocker{
    position:absolute;
    top:0;
    right:0;
    width:80px;
    height:80px;
    background:transparent;
    z-index:50;
    pointer-events:auto;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="video-frame">

    <!-- Blue HUD Corners -->

    <div class="corner tl-corner"></div>
    <div class="corner tr-corner"></div>
    <div class="corner bl-corner"></div>
    <div class="corner br-corner"></div>

    <!-- Anti-Google Plates -->

    <div class="plate tl-plate"></div>
    <div class="plate tr-plate"></div>
    <div class="plate bl-plate"></div>
    <div class="plate br-plate"></div>

    <div class="video-container">

        <iframe
            src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
            allow="autoplay"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin">
        </iframe>

        <!-- Commander Googleius Containment Shield -->

        <div class="googleius-blocker"></div>

    </div>

</div>

</body>
</html>
