<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#07122a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    font-size:64px;
    margin-bottom:25px;
    letter-spacing:2px;
}

.cinema-frame{
    position:relative;
    width:90%;
    max-width:1200px;
    margin:auto;
}

.video-container{
    position:relative;
    aspect-ratio:16/9;
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* FILM STRIPS */

.film-left,
.film-right{
    position:absolute;
    top:0;
    bottom:0;
    width:48px;

    background:#000;

    z-index:40;
    pointer-events:none;
}

.film-left{
    left:-8px;
}

.film-right{
    right:-8px;
}

/* FILM HOLES */

.hole{
    width:26px;
    height:18px;

    background:#cfcfcf;

    border-radius:3px;

    margin:8px auto;

    box-shadow:
        inset 0 0 3px rgba(0,0,0,.35),
        0 0 2px rgba(255,255,255,.08);
}

/* COMMANDER GOOGLEIUS CONTAINMENT */

.googleius-blocker{
    position:absolute;
    top:0;
    right:0;
    width:90px;
    height:90px;
    background:transparent;
    z-index:60;
    pointer-events:auto;
}

</style>
</head>

<body>

<h1>Nova Humanitatis</h1>

<div class="cinema-frame">

    <!-- LEFT FILM STRIP -->

    <div class="film-left">

        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>

    </div>

    <!-- RIGHT FILM STRIP -->

    <div class="film-right">

        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>

    </div>

    <!-- VIDEO -->

    <div class="video-container">

        <iframe
            src="https://drive.google.com/file/d/1vqgtaP1BuL1OukWM6_U_B5bNDmNkdTy0/preview"
            allow="autoplay"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin">
        </iframe>

        <!-- Commander Googleius Containment Shield -->

        <div class="googleius-blocker"></div>

    </div>

</div>

</body>
</html>
