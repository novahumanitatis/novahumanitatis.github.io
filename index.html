<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Humanitatis</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
}

/* Header */
.header{
    text-align:center;
    padding:30px 20px;
    font-size:clamp(32px,5vw,64px);
    font-weight:bold;
    letter-spacing:2px;
}

/* Navigation Bar */
.navbar{
    display:flex;
    justify-content:center;
    gap:30px;
    padding:15px;
    background:#111;
    border-top:1px solid #333;
    border-bottom:1px solid #333;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-size:20px;
    padding:10px 20px;
    transition:0.3s;
}

.navbar a:hover{
    background:#222;
    border-radius:5px;
}

/* Main Content */
.content{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    text-align:center;
}
</style>

</head>
<body>

<div class="header">
    Nova Humanitatis
</div>

<div class="navbar">
    <a href="episodes.html">Episodes</a>
</div>

<div class="content">
    <h2>Welcome</h2>
    <p>The official Nova Humanitatis portal.</p>
</div>

</body>
</html>
