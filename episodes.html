<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Episodes | Nova Humanitatis</title>

  <style>
    :root {
      --gold: #d8a327;
      --gold-soft: rgba(216, 163, 39, 0.42);
      --gold-faint: rgba(216, 163, 39, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: "Cinzel", "Georgia", serif;
      color: var(--gold);
      background: #02040a;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.62)),
        url("episodes.webp");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 28px;
    }

    .nav {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 10;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .nav a {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 104px;
      padding: 13px 22px;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--gold-soft);
      border-radius: 8px;
      background: rgba(28, 30, 34, 0.86);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.28),
        inset 0 0 0 1px var(--gold-faint);
      overflow: hidden;
      transition:
        transform 220ms ease,
        border-color 220ms ease,
        background 220ms ease,
        box-shadow 220ms ease;
    }

    .nav a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 0%,
        rgba(216, 163, 39, 0.32) 45%,
        transparent 72%
      );
      transform: translateX(-120%);
      transition: transform 520ms ease;
    }

    .nav a:hover,
    .nav a:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(216, 163, 39, 0.68);
      background: rgba(36, 39, 45, 0.9);
      box-shadow:
        0 16px 42px rgba(216, 163, 39, 0.16),
        inset 0 0 0 1px rgba(216, 163, 39, 0.22);
      outline: none;
    }

    .nav a:hover::before,
    .nav a:focus-visible::before {
      transform: translateX(120%);
    }

    .content {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      padding: 120px clamp(18px, 6vw, 88px) 56px;
    }

    .episodes {
      width: min(1100px, 100%);
    }

    .kicker {
      margin-bottom: 18px;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.72);
    }

    h1 {
      margin-bottom: 34px;
      color: var(--gold);
      font-size: clamp(3rem, 7vw, 6.8rem);
      line-height: 0.92;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow:
        0 5px 28px rgba(0, 0, 0, 0.82),
        0 0 18px rgba(216, 163, 39, 0.18);
    }

    .episode-card {
      display: grid;
      grid-template-columns: minmax(260px, 420px) 1fr;
      gap: 28px;
      align-items: center;
      width: min(980px, 100%);
      min-height: 300px;
      padding: 24px;
      color: var(--gold);
      text-decoration: none;
      border-radius: 8px;
      background: rgba(28, 30, 34, 0.86);
      border: 1px solid var(--gold-soft);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.34),
        inset 0 0 0 1px var(--gold-faint);
      overflow: hidden;
      transition:
        transform 220ms ease,
        border-color 220ms ease,
        background 220ms ease,
        box-shadow 220ms ease;
    }

    .episode-card:hover,
    .episode-card:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(216, 163, 39, 0.68);
      background: rgba(36, 39, 45, 0.9);
      box-shadow:
        0 16px 42px rgba(216, 163, 39, 0.14),
        inset 0 0 0 1px rgba(216, 163, 39, 0.22);
      outline: none;
    }

    .episode-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      border-radius: 6px;
      border: 1px solid var(--gold-soft);
      background: rgba(0, 0, 0, 0.35);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.38);
    }

    .episode-copy {
      position: relative;
      z-index: 1;
    }

    .episode-label {
      margin-bottom: 9px;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .episode-title {
      color: var(--gold);
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.08;
      letter-spacing: 0.03em;
    }

    .episode-note {
      margin-top: 14px;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--gold);
    }

    @media (max-width: 720px) {
      .page {
        padding: 18px;
      }

      .nav {
        top: 16px;
        right: 16px;
        left: 16px;
        justify-content: flex-end;
        gap: 8px;
      }

      .nav a {
        min-width: 0;
        padding: 10px 11px;
        font-size: 0.68rem;
      }

      .content {
        padding: 104px 4px 34px;
      }

      h1 {
        margin-bottom: 24px;
      }

      .episode-card {
        grid-template-columns: 1fr;
        gap: 18px;
        padding: 16px;
        min-height: auto;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <nav class="nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="stills.html">Stills</a>
      <a href="about.html">About</a>
    </nav>

    <section class="content">
      <div class="episodes">
        <p class="kicker">The Series</p>
        <h1>Episodes</h1>

        <a class="episode-card" href="episode1.html" aria-label="Open Episode 1 - Praeludium">
          <img class="episode-image" src="./episode1.webp?v=4" alt="Episode 1 - Praeludium" />

          <div class="episode-copy">
            <p class="episode-label">Episode 1</p>
            <h2 class="episode-title">Praeludium</h2>
            <p class="episode-note">
              The opening movement of Nova Humanitatis
            </p>
          </div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
